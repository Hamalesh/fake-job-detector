<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fake Job Detector</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .main {
        display: flex;
        width: 850px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    /* LEFT SIDE - APP */
    .app {
        flex: 2;
        padding: 30px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(15px);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    textarea {
        width: 100%;
        height: 140px;
        border-radius: 10px;
        border: none;
        padding: 12px;
        font-size: 14px;
        outline: none;
        resize: none;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.03);
        opacity: 0.9;
    }

    .result {
        margin-top: 20px;
        text-align: center;
        font-size: 18px;
    }

    .fake {
        color: #ff4d4d;
    }

    .real {
        color: #00ff99;
    }

    /* RIGHT SIDE - AUTHOR */
    .author {
        flex: 1;
        background: linear-gradient(160deg, #111, #1a1a1a);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        border-left: 1px solid rgba(255,255,255,0.1);
    }

    .avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .author h2 {
        font-size: 18px;
        margin-bottom: 5px;
    }

    .author p {
        font-size: 13px;
        opacity: 0.7;
        text-align: center;
    }

</style>
</head>

<body>

<div class="main">

    <!-- APP SIDE -->
    <div class="app">
        <h1>Fake Job Detector</h1>

        <form action="/predict" method="POST">
            <textarea name="text" placeholder="Paste job description here..." required></textarea>
            <button type="submit">Analyze Job</button>
        </form>

        {% if prediction %}
        <div class="result">
            Result:
            <span class="{{ 'fake' if 'Fake' in prediction else 'real' }}">
                {{ prediction }}
            </span>
        </div>
        {% endif %}
    </div>

    <!-- AUTHOR COLUMN -->
    <div class="author">
        <div class="avatar">H</div>
        <h2>HDK</h2>
        <p>Developer & Designer</p>
        <p style="margin-top:10px;">Fake Job Detection System</p>
    </div>

</div>

</body>
</html>
